<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Type O Foods Index</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Type O Foods">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #111111;
    --border-color: #dddddd;
    --beneficial: #006600;
    --neutral: #555555;
    --avoid: #cc0000;
    --highlight: #fff2a8;
  }
  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  body {
    font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0 auto;
    padding: 20px;
    max-width: 900px;
    font-size: 13px;
    line-height: 1.4;
  }
  h1 {
    font-size: 1.2rem;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
    margin-top: 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Search field with inline clear button */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px 64px 10px 10px;
    font-family: inherit;
    font-size: 1rem;
    border: 1px solid #aaa;
    box-sizing: border-box;
    outline: none;
  }
  input[type="text"]:focus {
    border-color: #333;
  }
  .search-hint {
    position: absolute;
    right: 32px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.7rem;
    color: #bbb;
    pointer-events: none;
    user-select: none;
  }
  #clear-search {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: none;
    font-family: inherit;
    font-size: 1.1rem;
    color: #999;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    display: none;
  }
  #clear-search:hover { color: #111; }

  /* Status quick-filter buttons */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .filter-btn {
    font-family: inherit;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border: 1px solid #ccc;
    background: var(--bg-color);
    color: var(--neutral);
    cursor: pointer;
  }
  .filter-btn:hover { border-color: #888; }
  .filter-btn.active {
    border-color: #111;
    color: #111;
    font-weight: bold;
    background: #f2f2f2;
  }
  .filter-btn[data-status="Highly Beneficial"].active { color: var(--beneficial); border-color: var(--beneficial); }
  .filter-btn[data-status="Avoid"].active { color: var(--avoid); border-color: var(--avoid); }

  /* Category dropdown */
  #category-select {
    width: 100%;
    padding: 9px 10px;
    font-family: inherit;
    font-size: 0.9rem;
    border: 1px solid #aaa;
    background: var(--bg-color);
    color: var(--text-color);
    margin-bottom: 12px;
    outline: none;
  }
  #category-select:focus { border-color: #333; }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th, td {
    border-bottom: 1px solid var(--border-color);
    padding: 8px 4px;
    text-align: left;
    vertical-align: top;
  }
  td {
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  th {
    font-weight: bold;
    border-bottom: 2px solid #aaa;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    background: var(--bg-color);
    white-space: nowrap;
  }
  th:hover { background: #f0f0f0; }
  th .arrow { color: #bbb; font-weight: normal; }
  th.sorted .arrow { color: #111; }
  .col-cat { width: 25%; }
  .col-food { width: 55%; }
  .col-status { width: 20%; font-weight: bold; }

  td .status-Highly,
  td .status-Beneficial { color: var(--beneficial); }
  td .status-Neutral { color: var(--neutral); }
  td .status-Avoid { color: var(--avoid); }

  mark {
    background: var(--highlight);
    color: inherit;
    padding: 0;
  }

  .empty {
    text-align: center;
    color: #999;
    padding: 30px 4px;
  }

  #count {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 10px;
    display: block;
  }

  /* Mobile */
  @media (max-width: 600px) {
    body {
      padding: 12px;
      font-size: 12px;
    }
    h1 {
      font-size: 1rem;
      letter-spacing: 0.5px;
    }
    input[type="text"] {
      font-size: 16px; /* prevents iOS zoom-on-focus */
      padding: 9px 56px 9px 9px;
    }
    #category-select { font-size: 16px; }
    .filter-btn {
      font-size: 0.72rem;
      padding: 6px 9px;
      flex: 1 1 auto;
      text-align: center;
    }
    th, td {
      padding: 7px 3px;
    }
    .col-cat { width: 27%; }
    .col-food { width: 46%; }
    .col-status { width: 27%; }
    /* hide the keyboard hint where there's no physical keyboard */
    .search-hint { display: none !important; }
  }
</style>
</head>
<body>

<h1>Type O Foods Index</h1>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Type to filter by food, category, or status..." autofocus>
  <span class="search-hint" id="search-hint">press /</span>
  <button id="clear-search" type="button" aria-label="Clear search" title="Clear (Esc)">&times;</button>
</div>

<select id="category-select" aria-label="Filter by category">
  <option value="All">All categories</option>
</select>

<div class="filters" id="filters">
  <button class="filter-btn active" data-status="All" type="button">All</button>
  <button class="filter-btn" data-status="Highly Beneficial" type="button">Highly Beneficial</button>
  <button class="filter-btn" data-status="Neutral" type="button">Neutral</button>
  <button class="filter-btn" data-status="Avoid" type="button">Avoid</button>
</div>

<span id="count"></span>

<table id="food-table">
  <thead>
    <tr>
      <th class="col-cat" data-col="0">Category <span class="arrow">&#x21D5;</span></th>
      <th class="col-food" data-col="1">Food <span class="arrow">&#x21D5;</span></th>
      <th class="col-status" data-col="2">Status <span class="arrow">&#x21D5;</span></th>
    </tr>
  </thead>
  <tbody id="food-body">
    </tbody>
</table>

  { cat: "Herbs & Teas", name: "White birch", status: "Neutral" },
  { cat: "Herbs & Teas", name: "White oak bark", status: "Neutral" },
  { cat: "Herbs & Teas", name: "Yarrow", status: "Neutral" },
  { cat: "Herbs & Teas", name: "Alfalfa", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Aloe", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Burdock", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Coltsfoot", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Corn silk", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Echinacea", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Gentian", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Goldenseal", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Red clover", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Rhubarb", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Senna", status: "Avoid" },
  { cat: "Herbs & Teas", name: "Shepherd's purse", status: "Avoid" },
  { cat: "Herbs & Teas", name: "St. John's wort", status: "Avoid" },

  // Beverages
  { cat: "Beverages", name: "Green tea", status: "Highly Beneficial" },
  { cat: "Beverages", name: "Wine (red)", status: "Neutral" },

  { cat: "Beverages", name: "Liquor", status: "Avoid" },
  { cat: "Beverages", name: "Seltzer water", status: "Avoid" },
  { cat: "Beverages", name: "Soda (all types)", status: "Avoid" },
  { cat: "Beverages", name: "Tea (black regular/decaf)", status: "Avoid" },
  { cat: "Beverages", name: "Wine (white)", status: "Avoid" }
];

const tableBody = document.getElementById('food-body');
const searchInput = document.getElementById('search');
const countSpan = document.getElementById('count');
const clearBtn = document.getElementById('clear-search');
const searchHint = document.getElementById('search-hint');
const filtersEl = document.getElementById('filters');
const categorySelect = document.getElementById('category-select');
const headers = Array.from(document.querySelectorAll('th[data-col]'));

const KEYS = ['cat', 'name', 'status'];
const STATUSES = ['All', 'Highly Beneficial', 'Neutral', 'Avoid'];
const STORE_KEY = 'typeOFoodsFilters';

// Restore saved filter choices (if any)
let saved = {};
try { saved = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { saved = {}; }

const categories = [...new Set(foodData.map(item => item.cat))];

let statusFilter = STATUSES.includes(saved.status) ? saved.status : 'All';
let categoryFilter = (saved.category === 'All' || categories.includes(saved.category)) ? saved.category : 'All';
let sortCol = -1;
let sortAsc = true;

function saveFilters() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({ status: statusFilter, category: categoryFilter }));
  } catch (e) { /* ignore quota/private-mode errors */ }
}

// Populate the category dropdown from the data (preserving first-seen order)
categories.forEach(cat => {
  const opt = document.createElement('option');
  opt.value = cat;
  opt.textContent = cat;
  categorySelect.appendChild(opt);
});
categorySelect.value = categoryFilter;

// Reflect restored status filter in the button states
filtersEl.querySelectorAll('.filter-btn').forEach(b =>
  b.classList.toggle('active', b.dataset.status === statusFilter)
);

function escapeHtml(str) {
  return str.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

// Highlight every occurrence of the query within a string (case-insensitive)
function highlight(text, query) {
  const safe = escapeHtml(text);
  if (!query) return safe;
  const lower = text.toLowerCase();
  let out = '';
  let i = 0;
  while (i < text.length) {
    const idx = lower.indexOf(query, i);
    if (idx === -1) { out += escapeHtml(text.slice(i)); break; }
    out += escapeHtml(text.slice(i, idx));
    out += '<mark>' + escapeHtml(text.slice(idx, idx + query.length)) + '</mark>';
    i = idx + query.length;
  }
  return out;
}

function matchesStatus(item) {
  if (statusFilter === 'All') return true;
  return item.status === statusFilter;
}

function renderTable(rows, query) {
  tableBody.innerHTML = '';

  if (rows.length === 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 3;
    td.className = 'empty';
    td.textContent = 'No matches — try a different term or filter.';
    tr.appendChild(td);
    tableBody.appendChild(tr);
    return;
  }

  const frag = document.createDocumentFragment();
  rows.forEach(item => {
    const tr = document.createElement('tr');

    const tdCat = document.createElement('td');
    tdCat.innerHTML = highlight(item.cat, query);

    const tdName = document.createElement('td');
    tdName.innerHTML = highlight(item.name, query);

    const tdStatus = document.createElement('td');
    const statusClass = 'status-' + item.status.split(' ')[0];
    tdStatus.innerHTML = '<span class="' + statusClass + '">' + highlight(item.status, query) + '</span>';

    tr.appendChild(tdCat);
    tr.appendChild(tdName);
    tr.appendChild(tdStatus);
    frag.appendChild(tr);
  });
  tableBody.appendChild(frag);
}

function update() {
  const query = searchInput.value.trim().toLowerCase();

  let rows = foodData.filter(item =>
    matchesStatus(item) &&
    (categoryFilter === 'All' || item.cat === categoryFilter) && (
      !query ||
      item.name.toLowerCase().includes(query) ||
      item.cat.toLowerCase().includes(query) ||
      item.status.toLowerCase().includes(query)
    )
  );

  if (sortCol !== -1) {
    const key = KEYS[sortCol];
    rows = rows.slice().sort((a, b) => {
      if (a[key] < b[key]) return sortAsc ? -1 : 1;
      if (a[key] > b[key]) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  renderTable(rows, query);

  const total = foodData.length;
  countSpan.textContent = rows.length === total
    ? `${total} items`
    : `${rows.length} of ${total} items`;

  clearBtn.style.display = searchInput.value ? 'block' : 'none';
  searchHint.style.display = searchInput.value ? 'none' : 'block';
}

// Search input
searchInput.addEventListener('input', update);

// Clear button
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchInput.focus();
  update();
});

// Status quick-filters
filtersEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  statusFilter = btn.dataset.status;
  filtersEl.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b === btn)
  );
  saveFilters();
  update();
});

// Category dropdown
categorySelect.addEventListener('change', () => {
  categoryFilter = categorySelect.value;
  saveFilters();
  update();
});

// Sorting via header click
headers.forEach(th => {
  th.addEventListener('click', () => {
    const col = Number(th.dataset.col);
    if (sortCol === col) {
      sortAsc = !sortAsc;
    } else {
      sortCol = col;
      sortAsc = true;
    }
    headers.forEach(h => {
      const arrow = h.querySelector('.arrow');
      if (Number(h.dataset.col) === sortCol) {
        h.classList.add('sorted');
        arrow.innerHTML = sortAsc ? '&#x25B2;' : '&#x25BC;';
      } else {
        h.classList.remove('sorted');
        arrow.innerHTML = '&#x21D5;';
      }
    });
    update();
  });
});

// Keyboard shortcuts: "/" to focus search, Esc to clear/blur
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  } else if (e.key === 'Escape' && document.activeElement === searchInput) {
    if (searchInput.value) {
      searchInput.value = '';
      update();
    } else {
      searchInput.blur();
    }
  }
});

// Initial render
update();
</script>
