<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #111111;
    --border-color: #dddddd;
    --beneficial: #006600;
    --neutral: #555555;
    --avoid: #cc0000;
  }
  body {
    font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0 auto;
    padding: 20px;
    max-width: 900px;
    font-size: 14px;
    line-height: 1.4;
  }
  h1 {
    font-size: 1.2rem;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
    margin-top: 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px;
    font-family: inherit;
    font-size: 1rem;
    border: 1px solid #aaa;
    margin-bottom: 20px;
    box-sizing: border-box;
    outline: none;
  }
  input[type="text"]:focus {
    border-color: #333;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th, td {
    border-bottom: 1px solid var(--border-color);
    padding: 8px 4px;
    text-align: left;
    vertical-align: top;
  }
  th {
    font-weight: bold;
    border-bottom: 2px solid #aaa;
    cursor: pointer;
  }
  th:hover {
    background: #f0f0f0;
  }
  .col-cat { width: 25%; }
  .col-food { width: 55%; }
  .col-status { width: 20%; font-weight: bold; }

  .status-Highly { color: var(--beneficial); }
  .status-Beneficial { color: var(--beneficial); }
  .status-Neutral { color: var(--neutral); }
  .status-Avoid { color: var(--avoid); }

  .hidden { display: none; }
  #count {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 10px;
    display: block;
  }
</style>
</head>
<body>

<input type="text" id="search" placeholder="Type to filter by food, category, or status..." autofocus>

const tableBody = document.getElementById('food-body');
const searchInput = document.getElementById('search');
const countSpan = document.getElementById('count');

function renderTable(dataToRender) {
  tableBody.innerHTML = '';
  dataToRender.forEach(item => {
    const tr = document.createElement('tr');

    const tdCat = document.createElement('td');
    tdCat.textContent = item.cat;

    const tdName = document.createElement('td');
    tdName.textContent = item.name;

    const tdStatus = document.createElement('td');
    const statusClass = "status-" + item.status.replace(/\s+/g, '');
    tdStatus.innerHTML = `<span class="${statusClass}">${item.status}</span>`;

    tr.appendChild(tdCat);
    tr.appendChild(tdName);
    tr.appendChild(tdStatus);
    tableBody.appendChild(tr);
  });
  countSpan.textContent = `Showing ${dataToRender.length} items`;
}

searchInput.addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  const filtered = foodData.filter(item =>
    item.name.toLowerCase().includes(query) ||
    item.cat.toLowerCase().includes(query) ||
    item.status.toLowerCase().includes(query)
  );
  renderTable(filtered);
});

// Basic sorting
let sortCol = -1;
let sortAsc = true;
function sortTable(colIndex) {
  const keys = ['cat', 'name', 'status'];
  const key = keys[colIndex];

  if (sortCol === colIndex) {
    sortAsc = !sortAsc;
  } else {
    sortCol = colIndex;
    sortAsc = true;
  }

  const sorted = [...foodData].sort((a, b) => {
    if (a[key] < b[key]) return sortAsc ? -1 : 1;
    if (a[key] > b[key]) return sortAsc ? 1 : -1;
    return 0;
  });

  // Re-apply search filter if there is one
  const query = searchInput.value.toLowerCase();
  const filtered = sorted.filter(item =>
    item.name.toLowerCase().includes(query) ||
    item.cat.toLowerCase().includes(query) ||
    item.status.toLowerCase().includes(query)
  );

  renderTable(filtered);
}

// Initial render
renderTable(foodData);
